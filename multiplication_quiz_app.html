<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かけ算クイズ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff;
  --bg2: #f4f3ef;
  --bg3: #eceae4;
  --text: #1a1a1a;
  --text2: #888780;
  --border: rgba(0,0,0,0.13);
  --border2: rgba(0,0,0,0.22);
  --accent: #533AB7;
  --accent-d: #3C2B8C;
  --correct: #1D9E75;
  --wrong: #D85A30;
  --r-lg: 12px;
  --r-xl: 16px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #181818;
    --bg2: #242422;
    --bg3: #2d2d2b;
    --text: #f0efea;
    --text2: #888780;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
  }
}
body {
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
}
#app {
  width: 100%;
  max-width: 420px;
  padding: 1.25rem 1rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}
.header-row {
  width: 100%;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 0.5rem;
}
.left-info { display: flex; flex-direction: column; gap: 1px; }
.left-label { font-size: 11px; color: var(--text2); }
.left-main { display: flex; align-items: baseline; gap: 10px; }
.left-num { font-size: 28px; font-weight: 500; color: var(--accent); line-height: 1; }
.timer-display { font-size: 15px; font-weight: 500; color: var(--text2); line-height: 1; font-variant-numeric: tabular-nums; }
.left-remain { font-size: 11px; color: var(--text2); }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.cumulative { font-size: 11px; color: var(--text2); font-variant-numeric: tabular-nums; }
.end-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.end-btn:active { background: var(--bg3); transform: scale(0.96); }
.score-row {
  width: 100%;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text2);
}
.score-val { font-size: 15px; font-weight: 500; color: var(--text); }
.streak-num { font-size: 15px; font-weight: 500; color: #BA7517; }
.progress-wrap {
  width: 100%;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.question-card {
  width: 100%;
  background: var(--bg3);
  border-radius: var(--r-xl);
  padding: 1.75rem 1.5rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  border: 0.5px solid var(--border);
}
.question-text {
  font-size: 52px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -1px;
}
.answer-display {
  font-size: 38px;
  font-weight: 500;
  min-width: 100px;
  min-height: 56px;
  border-bottom: 2.5px solid var(--border2);
  text-align: center;
  color: var(--text);
  padding-bottom: 4px;
  transition: color 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.answer-display.correct { color: var(--correct); border-color: var(--correct); }
.answer-display.wrong { color: var(--wrong); border-color: var(--wrong); }
.feedback {
  font-size: 15px;
  min-height: 22px;
  color: var(--text2);
  text-align: center;
  font-weight: 500;
}
.feedback.correct { color: var(--correct); }
.feedback.wrong { color: var(--wrong); }
.keypad {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
}
.key {
  background: var(--bg);
  border: 0.5px solid var(--border2);
  border-radius: var(--r-lg);
  height: 68px;
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.08s, transform 0.08s;
}
.key:active { background: var(--bg2); transform: scale(0.95); }
.key.del { font-size: 15px; color: var(--text2); background: var(--bg2); }
.key.enter {
  font-size: 16px; font-weight: 500;
  color: #fff; background: var(--accent); border-color: transparent;
}
.key.enter:active { background: var(--accent-d); }
.key[disabled] { opacity: 0.35; pointer-events: none; }
.hidden { display: none !important; }

/* heatmap */
#heatmap-section { width: 100%; }
.heatmap-title { font-size: 17px; font-weight: 500; text-align: center; margin-bottom: 4px; }
.heatmap-sub { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 1rem; }
.heatmap-grid {
  width: 100%;
  display: grid;
  grid-template-columns: 24px repeat(8, 1fr);
  gap: 3px;
}
.hm-head {
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: var(--text2); height: 26px;
}
.hm-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: #fff;
  position: relative;
}
.heatmap-legend {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-top: 8px;
  font-size: 11px; color: var(--text2);
}
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 3px; }
.hm-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem;
}
.stat-card {
  background: var(--bg2); border-radius: var(--r-lg);
  padding: 0.75rem 1rem; text-align: center;
}
.s-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.s-val { font-size: 22px; font-weight: 500; }
.action-row { display: flex; gap: 8px; margin-top: 1.25rem; }
.restart-btn {
  flex: 1; height: 52px; border-radius: var(--r-lg);
  border: none; background: var(--accent); color: #fff;
  font-size: 16px; font-weight: 500; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.restart-btn:active { background: var(--accent-d); transform: scale(0.98); }
.reset-btn {
  height: 52px; padding: 0 18px; border-radius: var(--r-lg);
  background: var(--bg2); color: var(--wrong);
  border: 0.5px solid var(--border2);
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.reset-btn:active { background: var(--bg3); transform: scale(0.98); }

/* modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  padding: 1rem;
}
.modal-card {
  width: 100%; max-width: 340px;
  background: var(--bg);
  border-radius: var(--r-xl);
  padding: 1.75rem 1.5rem;
  display: flex; flex-direction: column; align-items: center;
  gap: 1rem;
  border: 0.5px solid var(--border);
}
.modal-title { font-size: 20px; font-weight: 500; }
.modal-desc { font-size: 13px; color: var(--text2); text-align: center; }
.modal-start-btn {
  width: 100%; height: 52px; border-radius: var(--r-lg);
  border: none; background: var(--accent); color: #fff;
  font-size: 16px; font-weight: 500; cursor: pointer;
}
.modal-start-btn:active { background: var(--accent-d); transform: scale(0.98); }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-section" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:1rem;">
    <div class="header-row">
      <div class="left-info">
        <div class="left-label">いまの段</div>
        <div class="left-main">
          <div class="left-num" id="left-display">?</div>
          <div class="timer-display" id="timer-display">0秒</div>
        </div>
        <div class="left-remain" id="left-remain">あと ? 問</div>
      </div>
      <div class="header-right">
        <div class="cumulative" id="cumulative-display">累積 0 問</div>
        <button class="end-btn" id="end-btn">終了 →</button>
      </div>
    </div>

    <div class="score-row">
      <span>正解 <span class="score-val" id="correct-count">0</span></span>
      <span>連続 <span class="streak-num" id="streak-count">0</span></span>
      <span>合計 <span class="score-val" id="total-count">0</span></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="question-card">
      <div class="question-text" id="question-text">? × ? ＝</div>
      <div class="answer-display" id="answer-display">
        <span id="answer-val">＿</span>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="keypad" id="keypad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key del" data-n="del">⌫ 消す</button>
      <button class="key" data-n="0">0</button>
      <button class="key enter" id="enter-btn" data-n="enter">決定</button>
    </div>
  </div>

  <div id="heatmap-section" class="hidden">
    <div class="heatmap-title">九九ヒートマップ</div>
    <div class="heatmap-sub">赤いほど間違えやすい問題です（累積記録）</div>
    <div class="heatmap-grid" id="heatmap-grid"></div>
    <div class="heatmap-legend">
      <span><span class="legend-swatch" style="background:var(--bg3);border:0.5px solid rgba(0,0,0,0.1)"></span>未回答</span>
      <span><span class="legend-swatch" style="background:#1D9E75"></span>得意</span>
      <span><span class="legend-swatch" style="background:#D85A30"></span>苦手</span>
    </div>
    <div class="hm-stats" id="hm-stats"></div>
    <div class="action-row">
      <button class="restart-btn" id="restart-btn">もう一度やる</button>
      <button class="reset-btn" id="clear-btn">記録リセット</button>
    </div>
  </div>
</div>

<!-- start modal -->
<div class="modal-overlay" id="start-modal">
  <div class="modal-card">
    <div class="modal-title">かけ算クイズ</div>
    <div class="modal-desc">スタートで計測開始。<br>各問題の経過時間を記録します。</div>
    <button class="modal-start-btn" id="start-btn">スタート</button>
  </div>
</div>

<script>
(function () {
  const STORAGE_KEY = 'quiz_stats_v1';
  const ROUND_SIZE  = 20;

  // ── dom refs ─────────────────────────────────────
  const $ = id => document.getElementById(id);
  const dom = {
    quizSection:   $('quiz-section'),
    heatmapSection:$('heatmap-section'),
    startModal:    $('start-modal'),
    leftDisplay:   $('left-display'),
    timerDisplay:  $('timer-display'),
    leftRemain:    $('left-remain'),
    cumulative:    $('cumulative-display'),
    correctCount:  $('correct-count'),
    streakCount:   $('streak-count'),
    totalCount:    $('total-count'),
    progressFill:  $('progress-fill'),
    question:      $('question-text'),
    answerDisplay: $('answer-display'),
    answerVal:     $('answer-val'),
    feedback:      $('feedback'),
    enterBtn:      $('enter-btn'),
    keypad:        $('keypad'),
    endBtn:        $('end-btn'),
    startBtn:      $('start-btn'),
    clearBtn:      $('clear-btn'),
    restartBtn:    $('restart-btn'),
    heatmapGrid:   $('heatmap-grid'),
    hmStats:       $('hm-stats'),
  };

  // ── storage ──────────────────────────────────────
  function makeEmptyStats() {
    const s = {};
    for (let i = 2; i <= 9; i++) {
      s[i] = {};
      for (let j = 2; j <= 9; j++) s[i][j] = { attempts: 0, wrong: 0, times: [] };
    }
    return s;
  }
  function migrateStats(s) {
    // fill missing cells / times[] for old records
    for (let i = 2; i <= 9; i++) {
      if (!s[i]) s[i] = {};
      for (let j = 2; j <= 9; j++) {
        if (!s[i][j]) s[i][j] = { attempts: 0, wrong: 0, times: [] };
        else if (!Array.isArray(s[i][j].times)) s[i][j].times = [];
      }
    }
    return s;
  }
  function loadStats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? migrateStats(JSON.parse(raw)) : makeEmptyStats();
    } catch (e) { return makeEmptyStats(); }
  }
  function saveStats() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch (e) {}
  }
  function clearStorage() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }
  function totalAttempts() {
    let t = 0;
    for (let i = 2; i <= 9; i++)
      for (let j = 2; j <= 9; j++) t += stats[i][j].attempts;
    return t;
  }

  // ── timer ────────────────────────────────────────
  const timer = {
    tickId: null,
    startedAt: 0,
    questionStartedAt: 0,
    start() {
      this.startedAt = this.questionStartedAt = Date.now();
      this.render();
      this.tickId = setInterval(() => this.render(), 200);
    },
    stop() {
      if (this.tickId) { clearInterval(this.tickId); this.tickId = null; }
    },
    resetQuestion() { this.questionStartedAt = Date.now(); },
    elapsedForQuestion() {
      return (Date.now() - this.questionStartedAt) / 1000;
    },
    render() {
      const sec = Math.floor((Date.now() - this.startedAt) / 1000);
      dom.timerDisplay.textContent = sec + '秒';
    },
  };

  // ── game state ───────────────────────────────────
  let stats = loadStats();
  let leftOp = 2;
  let leftRemain = ROUND_SIZE;
  let userInput = '';
  let answered = false;
  let curA, curB, curAnswer;
  let lastB = -1;
  let totalCorrect = 0, totalAnswered = 0, streak = 0;

  // ── ui updaters ──────────────────────────────────
  function updateCumulative() {
    dom.cumulative.textContent = '累積 ' + totalAttempts() + ' 問';
  }
  function updateRemain() {
    dom.leftRemain.textContent = 'あと ' + leftRemain + ' 問';
    dom.progressFill.style.width = ((ROUND_SIZE - leftRemain) / ROUND_SIZE * 100) + '%';
  }
  function updateScore() {
    dom.correctCount.textContent = totalCorrect;
    dom.streakCount.textContent  = streak;
    dom.totalCount.textContent   = totalAnswered;
  }

  // ── question selection ───────────────────────────
  function pickLeftOp() {
    leftOp = Math.floor(Math.random() * 8) + 2;
    leftRemain = ROUND_SIZE;
    dom.leftDisplay.textContent = leftOp;
    updateRemain();
  }
  function pickRightOp() {
    const ws = [];
    for (let j = 2; j <= 9; j++) {
      if (j === lastB) continue;
      const s1 = stats[leftOp][j];
      const s2 = stats[j] ? stats[j][leftOp] : null;
      const att = s1.attempts + (s2 ? s2.attempts : 0);
      const wrg = s1.wrong    + (s2 ? s2.wrong   : 0);
      const er  = att > 0 ? wrg / att : 0;
      ws.push({ j, w: 1 + er * 5 });
    }
    const total = ws.reduce((s, x) => s + x.w, 0);
    let r = Math.random() * total;
    for (const { j, w } of ws) {
      r -= w;
      if (r <= 0) return j;
    }
    return ws[ws.length - 1].j;
  }
  function newQuestion() {
    if (leftRemain <= 0) pickLeftOp();
    curA = leftOp;
    curB = pickRightOp();
    lastB = curB;
    curAnswer = curA * curB;
    dom.question.textContent = curA + ' × ' + curB + ' ＝';
    userInput = '';
    answered  = false;
    dom.answerVal.textContent  = '＿';
    dom.answerDisplay.className = 'answer-display';
    dom.feedback.textContent  = '';
    dom.feedback.className    = 'feedback';
    dom.enterBtn.removeAttribute('disabled');
    timer.resetQuestion();
  }

  // ── answer submission ────────────────────────────
  function submit() {
    if (answered || userInput === '') return;
    answered = true;
    dom.enterBtn.setAttribute('disabled', 'true');

    const n  = parseInt(userInput, 10);
    const ok = n === curAnswer;
    const elapsed = +timer.elapsedForQuestion().toFixed(2);

    const cell = stats[curA][curB];
    cell.attempts++;
    cell.times.push(elapsed);
    if (!ok) cell.wrong++;

    totalAnswered++;
    leftRemain--;
    if (ok) { totalCorrect++; streak++; } else { streak = 0; }

    updateRemain();
    updateScore();
    updateCumulative();

    if (ok) {
      dom.answerDisplay.classList.add('correct');
      dom.feedback.className   = 'feedback correct';
      dom.feedback.textContent = streak >= 3 ? '正解！ 🔥 ' + streak + '連続！' : '正解！';
    } else {
      dom.answerDisplay.classList.add('wrong');
      dom.feedback.className   = 'feedback wrong';
      dom.feedback.textContent = '✗ 正解は ' + curAnswer;
    }
    saveStats();
    setTimeout(newQuestion, ok ? 450 : 1300);
  }

  // ── heatmap ──────────────────────────────────────
  function lerpColor(t) {
    const r = Math.round(0x1D + t * (0xD8 - 0x1D));
    const g = Math.round(0x9E + t * (0x5A - 0x9E));
    const b = Math.round(0x75 + t * (0x30 - 0x75));
    return `rgb(${r},${g},${b})`;
  }
  function avgTime(times) {
    if (!times.length) return 0;
    return times.reduce((a, b) => a + b, 0) / times.length;
  }
  function showHeatmap() {
    timer.stop();
    dom.quizSection.classList.add('hidden');
    dom.heatmapSection.classList.remove('hidden');
    buildHeatmap();
  }
  function buildHeatmap() {
    dom.heatmapGrid.innerHTML = '';

    const corner = document.createElement('div');
    corner.className = 'hm-head';
    dom.heatmapGrid.appendChild(corner);

    for (let j = 2; j <= 9; j++) {
      const h = document.createElement('div');
      h.className = 'hm-head';
      h.textContent = j;
      dom.heatmapGrid.appendChild(h);
    }

    for (let i = 2; i <= 9; i++) {
      const rl = document.createElement('div');
      rl.className = 'hm-head';
      rl.textContent = i;
      dom.heatmapGrid.appendChild(rl);

      for (let j = 2; j <= 9; j++) {
        const cell = document.createElement('div');
        cell.className = 'hm-cell';
        const s = stats[i][j];
        if (s.attempts === 0) {
          cell.style.background = 'var(--bg3)';
          cell.style.border = '0.5px solid rgba(128,128,128,0.15)';
        } else {
          const er = s.wrong / s.attempts;
          cell.style.background = lerpColor(er);
          if (s.attempts >= 2) cell.textContent = Math.round(er * 100) + '%';
        }
        const avg = avgTime(s.times);
        const avgStr = avg > 0 ? '\n平均 ' + avg.toFixed(1) + '秒' : '';
        cell.title = i + ' × ' + j + ' ＝ ' + (i*j) +
          (s.attempts ? '\n' + s.attempts + '回中 ' + s.wrong + '回ミス' + avgStr : '\n未回答');
        dom.heatmapGrid.appendChild(cell);
      }
    }

    // summary (cumulative)
    let worstEr = -1, worstLbl = '-', bestEr = 2, bestLbl = '-';
    let allTimes = [];
    for (let i = 2; i <= 9; i++) {
      for (let j = 2; j <= 9; j++) {
        const s = stats[i][j];
        if (s.times.length) allTimes = allTimes.concat(s.times);
        if (!s.attempts) continue;
        const er = s.wrong / s.attempts;
        if (er > worstEr) { worstEr = er; worstLbl = i + '×' + j; }
        if (er < bestEr)  { bestEr  = er; bestLbl  = i + '×' + j; }
      }
    }

    const totalAll = totalAttempts();
    let correctAll = 0;
    for (let i = 2; i <= 9; i++)
      for (let j = 2; j <= 9; j++)
        correctAll += stats[i][j].attempts - stats[i][j].wrong;
    const accAll = totalAll > 0 ? Math.round(correctAll / totalAll * 100) : 0;
    const avgAll = allTimes.length ? avgTime(allTimes).toFixed(1) : '-';

    dom.hmStats.innerHTML = `
      <div class="stat-card">
        <div class="s-label">累積正解率</div>
        <div class="s-val" style="color:var(--accent)">${accAll}%</div>
      </div>
      <div class="stat-card">
        <div class="s-label">累積問題数</div>
        <div class="s-val">${totalAll}</div>
      </div>
      <div class="stat-card">
        <div class="s-label">平均解答時間</div>
        <div class="s-val">${avgAll}<span style="font-size:14px;color:var(--text2)">${avgAll === '-' ? '' : '秒'}</span></div>
      </div>
      <div class="stat-card">
        <div class="s-label">最も苦手</div>
        <div class="s-val" style="color:var(--wrong);font-size:18px">${worstLbl}</div>
      </div>
      <div class="stat-card">
        <div class="s-label">最も得意</div>
        <div class="s-val" style="color:var(--correct);font-size:18px">${bestLbl}</div>
      </div>`;
  }

  // ── flow control ─────────────────────────────────
  function beginSession() {
    dom.startModal.classList.add('hidden');
    pickLeftOp();
    newQuestion();
    timer.start();
  }
  function restartGame() {
    totalCorrect = 0; totalAnswered = 0; streak = 0; lastB = -1;
    updateScore();
    dom.heatmapSection.classList.add('hidden');
    dom.quizSection.classList.remove('hidden');
    dom.startModal.classList.remove('hidden');
    updateCumulative();
  }
  function resetAllRecords() {
    if (!confirm('記録をすべてリセットしますか？')) return;
    clearStorage();
    stats = makeEmptyStats();
    updateCumulative();
    buildHeatmap();
  }

  // ── events ───────────────────────────────────────
  dom.keypad.addEventListener('click', e => {
    const btn = e.target.closest('.key');
    if (!btn || answered) return;
    const n = btn.dataset.n;
    if (n === 'del') {
      userInput = userInput.slice(0, -1);
    } else if (n === 'enter') {
      submit(); return;
    } else {
      if (userInput.length >= 2) return;
      userInput += n;
    }
    dom.answerVal.textContent = userInput === '' ? '＿' : userInput;
  });
  dom.endBtn.addEventListener('click', showHeatmap);
  dom.restartBtn.addEventListener('click', restartGame);
  dom.clearBtn.addEventListener('click', resetAllRecords);
  dom.startBtn.addEventListener('click', beginSession);

  // ── init ─────────────────────────────────────────
  updateCumulative();
  updateScore();
  dom.leftDisplay.textContent = '?';
  dom.timerDisplay.textContent = '0秒';
})();
</script>
</body>
</html>
