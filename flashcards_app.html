<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>暗記カード</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff;
  --bg2: #f4f3ef;
  --bg3: #eceae4;
  --text: #1a1a1a;
  --text2: #888780;
  --border: rgba(0,0,0,0.13);
  --border2: rgba(0,0,0,0.22);
  --accent: #533AB7;
  --accent-d: #3C2B8C;
  --correct: #1D9E75;
  --wrong: #D85A30;
  --r-lg: 12px;
  --r-xl: 16px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #181818;
    --bg2: #242422;
    --bg3: #2d2d2b;
    --text: #f0efea;
    --text2: #888780;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
  }
}
body {
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
}
#app {
  width: 100%;
  max-width: 420px;
  padding: 1.25rem 1rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.hidden { display: none !important; }

/* ---------- settings ---------- */
.title-row { display: flex; flex-direction: column; gap: 4px; }
.page-title { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; }
.page-sub { font-size: 12px; color: var(--text2); line-height: 1.5; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.08em;
  margin-top: 8px;
  text-transform: uppercase;
}
.category-list { display: flex; flex-direction: column; gap: 6px; }
.category-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
}
.category-head {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
}
.category-head input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.category-opts {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 13px;
  color: var(--text2);
  padding-left: 28px;
  flex-wrap: wrap;
}
.category-opts select {
  padding: 3px 6px;
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.category-opts select:focus { outline: 1.5px solid var(--accent); outline-offset: 1px; }
.category-row.disabled .category-opts { opacity: 0.4; pointer-events: none; }
.rev-label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  margin-left: auto;
}
.rev-label input[type="checkbox"] {
  width: 14px; height: 14px;
  accent-color: var(--accent);
  cursor: pointer;
}

.footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
  padding: 0 4px;
}
.count-label { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text2); }
.count-label select {
  padding: 4px 8px;
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
}
.start-btn {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--r-lg);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 4px;
}
.start-btn:active { background: var(--accent-d); transform: scale(0.99); }
.start-btn:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; }

/* ---------- card section ---------- */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.back-btn {
  padding: 7px 14px;
  border-radius: 18px;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.back-btn:active { background: var(--bg3); transform: scale(0.96); }
.progress-label {
  font-size: 13px;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.progress-wrap {
  width: 100%;
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}

.card-wrap {
  perspective: 1200px;
  width: 100%;
  aspect-ratio: 4/5;
  max-height: 58dvh;
  cursor: pointer;
  position: relative;
  margin-top: 4px;
  user-select: none;
}
.tap-zone {
  position: absolute;
  top: 0; bottom: 0;
  width: 50%;
  z-index: 5;
}
.tap-zone.left  { left: 0; }
.tap-zone.right { right: 0; }
.tap-zone.disabled { pointer-events: none; }
.card-inner {
  position: absolute;
  inset: 0;
  transition: transform 0.28s cubic-bezier(0.4, 0.0, 0.2, 1);
  transform-style: preserve-3d;
  transform: rotateY(0deg);
}
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--r-xl);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 22px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.08), 0 1.5px 4px rgba(0,0,0,0.05);
  overflow: hidden;
  text-align: center;
}
@media (prefers-color-scheme: dark) {
  .card-face { box-shadow: 0 6px 24px rgba(0,0,0,0.4), 0 1.5px 4px rgba(0,0,0,0.2); }
}
.card-front {
  background: var(--bg2);
  border: 0.5px solid var(--border);
}
.card-back {
  background: var(--accent);
  color: white;
  transform: rotateY(180deg);
}
.card-category {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text2);
  text-transform: uppercase;
  font-weight: 600;
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}
.card-back .card-category { color: rgba(255,255,255,0.7); }
.card-question {
  font-size: clamp(32px, 10vw, 44px);
  font-weight: 500;
  line-height: 1.25;
  font-variant-numeric: tabular-nums;
  word-break: break-word;
}
.card-question sup { font-size: 0.6em; vertical-align: super; }
.card-answer {
  font-size: clamp(28px, 9vw, 40px);
  font-weight: 600;
  line-height: 1.25;
  font-variant-numeric: tabular-nums;
  word-break: break-word;
}
.card-hint {
  margin-top: 16px;
  font-size: 12px;
  line-height: 1.6;
  color: rgba(255,255,255,0.75);
  max-width: 90%;
}
.tap-hint {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 0.05em;
  pointer-events: none;
  white-space: nowrap;
}
.card-back .tap-hint { color: rgba(255,255,255,0.5); }

/* ---------- mastery gauge ---------- */
.gauge-wrap {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
.gauge-label {
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 0.06em;
  font-weight: 600;
  text-transform: uppercase;
}
.gauge-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  position: relative;
}
.gauge-tap-zone {
  position: absolute;
  top: -6px; bottom: -6px;
  width: 50%;
  z-index: 5;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.gauge-tap-zone.left  { left: 0; }
.gauge-tap-zone.right { right: 0; }
.gauge-tap-zone.disabled { pointer-events: none; cursor: default; }
.gauge-btn {
  flex: 0 0 auto;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text);
  font-size: 18px;
  font-weight: 600;
  pointer-events: none;
  transition: all 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.gauge-btn.disabled { opacity: 0.35; }
.gauge-bar {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.gauge-cell {
  height: 28px;
  border-radius: 6px;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text2);
  font-weight: 600; font-variant-numeric: tabular-nums;
  transition: background 0.18s, color 0.18s, transform 0.12s;
}
.gauge-cell.selected {
  background: var(--accent);
  color: #fff;
  transform: scale(1.06);
}
.gauge-cell.neg.selected { background: var(--wrong); }
.gauge-cell.pos.selected { background: var(--correct); }
.gauge-hint {
  font-size: 10px; color: var(--text2);
  letter-spacing: 0.04em;
}

.empty-notice {
  font-size: 13px;
  color: var(--wrong);
  text-align: center;
  padding: 8px;
  display: none;
}
.empty-notice.show { display: block; }

.storage-notice { font-size: 10px; color: var(--text2); text-align: center; margin-top: 12px; line-height: 1.5; }

.dashboard-link {
  display: block;
  text-align: center;
  margin-top: 8px;
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  padding: 8px;
}
.dashboard-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="app">

  <!-- ======= Settings ======= -->
  <section id="settings-section">
    <div class="title-row">
      <h1 class="page-title">暗記カード</h1>
      <p class="page-sub">カードをタップして答えを確認する、単語帳スタイルの暗記アプリ。試験で役立つ数字の組み合わせを覚えよう。</p>
    </div>

    <div class="section-title">基本暗記</div>
    <div class="category-list">
      <div class="category-row" data-row="squares">
        <label class="category-head">
          <input type="checkbox" data-cat="squares">
          <span>平方（二乗）</span>
        </label>
        <div class="category-opts">
          2² 〜
          <select data-opt="squares.max">
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
            <option value="30">30</option>
          </select>
          <span>²</span>
          <label class="rev-label"><input type="checkbox" data-rev="squares"> 逆向きも</label>
        </div>
      </div>

      <div class="category-row" data-row="cubes">
        <label class="category-head">
          <input type="checkbox" data-cat="cubes">
          <span>立方（三乗）</span>
        </label>
        <div class="category-opts">
          2³ 〜
          <select data-opt="cubes.max">
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="15">15</option>
          </select>
          <span>³</span>
          <label class="rev-label"><input type="checkbox" data-rev="cubes"> 逆向きも</label>
        </div>
      </div>

      <div class="category-row" data-row="factorials">
        <label class="category-head">
          <input type="checkbox" data-cat="factorials">
          <span>階乗</span>
        </label>
        <div class="category-opts">
          3! 〜
          <select data-opt="factorials.max">
            <option value="6">6</option>
            <option value="8">8</option>
            <option value="10">10</option>
          </select>
          <span>!</span>
          <label class="rev-label"><input type="checkbox" data-rev="factorials"> 逆向きも</label>
        </div>
      </div>

      <div class="category-row" data-row="powers">
        <label class="category-head">
          <input type="checkbox" data-cat="powers">
          <span>べき乗</span>
        </label>
        <div class="category-opts">
          <span>底:</span>
          <select data-opt="powers.base">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="7">7</option>
            <option value="10">10</option>
          </select>
          <span>、指数 2 〜</span>
          <select data-opt="powers.max">
            <option value="6">6</option>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="12">12</option>
          </select>
          <label class="rev-label"><input type="checkbox" data-rev="powers"> 逆向きも</label>
        </div>
      </div>
    </div>

    <div class="section-title">受験頻出パターン</div>
    <div class="category-list">
      <div class="category-row" data-row="pythagorean">
        <label class="category-head">
          <input type="checkbox" data-cat="pythagorean">
          <span>ピタゴラス数（3辺の組）</span>
        </label>
      </div>

      <div class="category-row" data-row="binomial">
        <label class="category-head">
          <input type="checkbox" data-cat="binomial">
          <span>二項係数 <sub>n</sub>C<sub>r</sub></span>
        </label>
      </div>
    </div>

    <div class="section-title">定数・無理数</div>
    <div class="category-list">
      <div class="category-row" data-row="constants">
        <label class="category-head">
          <input type="checkbox" data-cat="constants">
          <span>定数・無理数（π, e, √, log, 分数 等）</span>
        </label>
      </div>
    </div>

    <div class="footer-row">
      <label class="count-label">
        <span>学習枚数</span>
        <select data-opt="count">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="50">50</option>
        </select>
      </label>
    </div>

    <div class="empty-notice" id="empty-notice">少なくとも1つのカテゴリを選択してください</div>
    <button class="start-btn" id="start-btn">学習開始</button>

    <a href="dashboard.html" class="dashboard-link">📊 学習ダッシュボードを見る</a>

    <p class="storage-notice">※ 設定と学習記録はこの端末のブラウザに保存されます。</p>
  </section>

  <!-- ======= Card ======= -->
  <section id="card-section" class="hidden">
    <div class="card-header">
      <button class="back-btn" id="back-btn">← 設定に戻る</button>
      <span class="progress-label" id="progress-label">1 / 20</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="card-wrap" id="card-wrap">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-front">
          <div class="card-category" id="card-front-cat"></div>
          <div class="card-question" id="card-question"></div>
          <div class="tap-hint">右タップでめくる ／ 左タップで前へ</div>
        </div>
        <div class="card-face card-back">
          <div class="card-category" id="card-back-cat"></div>
          <div class="card-answer" id="card-answer"></div>
          <div class="card-hint" id="card-hint"></div>
          <div class="tap-hint">右タップで次へ ／ 左タップで戻る</div>
        </div>
      </div>
      <div class="tap-zone left"  id="tap-left"></div>
      <div class="tap-zone right" id="tap-right"></div>
    </div>
    <div class="gauge-wrap" id="gauge-wrap">
      <div class="gauge-label">覚えた指標</div>
      <div class="gauge-row">
        <div class="gauge-btn" id="gauge-minus" aria-hidden="true">◀</div>
        <div class="gauge-bar" id="gauge-bar"></div>
        <div class="gauge-btn" id="gauge-plus" aria-hidden="true">▶</div>
        <div class="gauge-tap-zone left"  id="gauge-tap-minus" role="button" aria-label="評価を下げる"></div>
        <div class="gauge-tap-zone right" id="gauge-tap-plus"  role="button" aria-label="評価を上げる"></div>
      </div>
      <div class="gauge-hint">−3：全く覚えていない ／ 0：未評価 ／ +3：完璧</div>
    </div>
  </section>

</div>

<script>
(function () {
  'use strict';

  const SETTINGS_KEY = 'flashcards_settings_v2';
  const RECORDS_KEY  = 'flashcards_records_v1';
  const ADVANCE_DELAY_MS = 700;
  const FLIP_MS = 280;

  const defaultSettings = {
    categories: {
      squares:     { enabled: true,  max: 20, reverse: false },
      cubes:       { enabled: false, max: 10, reverse: false },
      factorials:  { enabled: false, max: 8,  reverse: false },
      powers:      { enabled: false, base: 2, max: 10, reverse: false },
      pythagorean: { enabled: false },
      binomial:    { enabled: false },
      constants:   { enabled: true }
    },
    count: 20
  };

  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return clone(defaultSettings);
      const parsed = JSON.parse(raw);
      const merged = clone(defaultSettings);
      if (parsed && parsed.categories) {
        for (const key of Object.keys(merged.categories)) {
          if (parsed.categories[key]) Object.assign(merged.categories[key], parsed.categories[key]);
        }
      }
      if (typeof parsed.count === 'number') merged.count = parsed.count;
      return merged;
    } catch (e) {
      return clone(defaultSettings);
    }
  }

  function saveSettings() {
    try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch (e) {}
  }

  function loadRecords() {
    try {
      const raw = localStorage.getItem(RECORDS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed && parsed.records) ? parsed.records : [];
    } catch (e) { return []; }
  }
  function appendRecord(rec) {
    const records = loadRecords();
    records.push(rec);
    try { localStorage.setItem(RECORDS_KEY, JSON.stringify({ records })); } catch (e) {}
  }

  let settings = loadSettings();

  // ---------- card generation ----------
  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function digitRange(min, max) { return [Math.pow(10, min - 1), Math.pow(10, max) - 1]; }

  const REVERSE_MAP = (function () {
    const map = {};
    const add = (val, rep, rank) => {
      if (val > 1e12) return;
      const key = String(val);
      if (!map[key]) map[key] = [];
      if (!map[key].some(x => x.rep === rep)) map[key].push({ rep, rank });
    };
    // squares: 2²〜30²
    for (let n = 2; n <= 30; n++) add(n * n, `${n}<sup>2</sup>`, n * 100 + 2);
    // cubes: 2³〜15³
    for (let n = 2; n <= 15; n++) add(n * n * n, `${n}<sup>3</sup>`, n * 100 + 3);
    // powers: base^exp (base∈{2,3,5,7,10}, exp 2〜20)
    for (const b of [2, 3, 5, 7, 10]) {
      let v = 1;
      for (let e = 1; e <= 20; e++) {
        v *= b;
        if (e >= 2) add(v, `${b}<sup>${e}</sup>`, b * 100 + e);
      }
    }
    // factorials: 1!〜10! (place after powers via large rank)
    const F = [1, 1, 2, 6, 24, 120, 720, 5040, 40320, 362880, 3628800];
    for (let n = 1; n <= 10; n++) add(F[n], `${n}!`, 1000000 + n);
    // finalize: sort by rank asc, extract rep strings
    const out = {};
    for (const k of Object.keys(map)) {
      out[k] = map[k].sort((a, b) => a.rank - b.rank).map(x => x.rep);
    }
    return out;
  })();

  function maybeReverse(card, s) {
    if (s && s.reverse && Math.random() < 0.5) {
      const reps = REVERSE_MAP[card.a] || [card.q];
      return { cat: '逆向き', q: card.a, a: reps.join(' ＝ ') };
    }
    return card;
  }
  function genSquare(s) {
    const n = randInt(2, Math.max(2, s.max));
    return maybeReverse({ cat: '平方', q: `${n}<sup>2</sup>`, a: String(n * n) }, s);
  }
  function genCube(s) {
    const n = randInt(2, Math.max(2, s.max));
    return maybeReverse({ cat: '三乗', q: `${n}<sup>3</sup>`, a: String(n * n * n) }, s);
  }
  const FACTS = [1, 1, 2, 6, 24, 120, 720, 5040, 40320, 362880, 3628800];
  function genFact(s) {
    const n = randInt(3, Math.min(Math.max(3, s.max), FACTS.length - 1));
    return maybeReverse({ cat: '階乗', q: `${n}!`, a: String(FACTS[n]) }, s);
  }
  function genPow(s) {
    const base = s.base || 2;
    const n = randInt(2, Math.max(2, s.max));
    return maybeReverse({ cat: `${base}のべき乗`, q: `${base}<sup>${n}</sup>`, a: String(Math.pow(base, n)) }, s);
  }
  const PYTH_TRIPLES = [[3,4,5],[5,12,13],[8,15,17],[7,24,25],[20,21,29],[9,40,41]];
  function genPythagorean() {
    const t = PYTH_TRIPLES[randInt(0, PYTH_TRIPLES.length - 1)];
    const hide = randInt(0, 2);
    const shown = t.map((v, i) => i === hide ? '?' : String(v));
    return { cat: 'ピタゴラス数', q: shown.join(', '), a: String(t[hide]) };
  }
  const BINOMIALS = [[5,2,10],[6,2,15],[6,3,20],[7,2,21],[7,3,35],[8,2,28],[8,3,56],[8,4,70],[9,3,84],[10,3,120],[10,4,210],[10,5,252]];
  function genBinomial() {
    const [n, r, v] = BINOMIALS[randInt(0, BINOMIALS.length - 1)];
    return { cat: '二項係数', q: `<sub>${n}</sub>C<sub>${r}</sub>`, a: String(v) };
  }

  const CONSTANTS = [
    { q: 'π (円周率)',         a: '3.14159265…', h: '語呂: 産医師異国に向かう (3.14159265)' },
    { q: 'e (自然対数の底)',    a: '2.71828182…', h: '語呂: 鮒一鉢二鉢一鉢二鉢 (2.71828 1828)' },
    { q: '√2',                 a: '1.41421356…', h: '語呂: 一夜一夜に人見頃' },
    { q: '√3',                 a: '1.7320508…',  h: '語呂: 人並みにおごれや' },
    { q: '√5',                 a: '2.2360679…',  h: '語呂: 富士山麓オウム鳴く' },
    { q: '√6',                 a: '2.4494897…',  h: '√2 × √3 ≒ 1.414 × 1.732' },
    { q: '√7',                 a: '2.6457513…',  h: '語呂: 菜(2.6)に虫(4)いない(57)' },
    { q: '√10',                a: '3.16227766…', h: '√10 = √2 · √5 ≒ 1.414 × 2.236' },
    { q: 'log₁₀ 2',            a: '0.3010',      h: '語呂: おっ父さん (0.3010)' },
    { q: 'log₁₀ 3',            a: '0.4771',      h: '語呂: 死なない (0.4771)' },
    { q: 'log₁₀ 5',            a: '0.6990',      h: '1 − log₁₀2 で導出' },
    { q: 'log₁₀ 7',            a: '0.8451',      h: '語呂: はよ来い (0.8451)' },
    { q: '1 / 7',              a: '0.142857142857…', h: '循環節 142857 を繰り返す' },
    { q: '2<sup>10</sup>',     a: '1024',        h: '1 KB = 1024 B の由来' },
    { q: 'sin 30°',            a: '1 / 2',       h: '基本三角比' },
    { q: 'sin 45°',            a: '√2 / 2 ≒ 0.7071', h: '基本三角比' },
    { q: 'sin 60°',            a: '√3 / 2 ≒ 0.8660', h: '基本三角比' },
    { q: 'cos 30°',            a: '√3 / 2 ≒ 0.8660', h: '基本三角比' },
    { q: 'cos 60°',            a: '1 / 2',       h: '基本三角比' },
    { q: 'tan 30°',            a: '1 / √3 ≒ 0.5774', h: '基本三角比' },
    { q: 'tan 60°',            a: '√3 ≒ 1.7320', h: '基本三角比' },
    { q: 'sin 15°',            a: '(√6 − √2) / 4', h: '加法定理 sin(45°−30°)' },
    { q: 'cos 15°',            a: '(√6 + √2) / 4', h: '加法定理 cos(45°−30°)' }
  ];
  function genConstant() {
    const c = CONSTANTS[randInt(0, CONSTANTS.length - 1)];
    return { cat: '定数・無理数', q: c.q, a: c.a, hint: c.h };
  }

  const GENERATORS = {
    squares: genSquare, cubes: genCube, factorials: genFact, powers: genPow,
    pythagorean: genPythagorean, binomial: genBinomial,
    constants: genConstant
  };

  function buildDeck() {
    const enabled = Object.keys(settings.categories).filter(k => settings.categories[k].enabled);
    if (enabled.length === 0) return [];
    const deck = [];
    const seen = new Set();
    const count = settings.count;
    let attempts = 0;
    const maxAttempts = count * 20;
    while (deck.length < count && attempts < maxAttempts) {
      attempts++;
      const catKey = enabled[randInt(0, enabled.length - 1)];
      const card = GENERATORS[catKey](settings.categories[catKey]);
      card.catKey = catKey;
      const key = `${catKey}:${card.q}`;
      if (!seen.has(key)) {
        seen.add(key);
        deck.push(card);
      }
    }
    return deck;
  }

  // ---------- UI ----------
  const settingsSection = document.getElementById('settings-section');
  const cardSection = document.getElementById('card-section');
  const startBtn = document.getElementById('start-btn');
  const backBtn = document.getElementById('back-btn');
  const cardWrap = document.getElementById('card-wrap');
  const cardInner = document.getElementById('card-inner');
  const tapLeft = document.getElementById('tap-left');
  const tapRight = document.getElementById('tap-right');
  const gaugeBar = document.getElementById('gauge-bar');
  const gaugeMinus = document.getElementById('gauge-minus');
  const gaugePlus = document.getElementById('gauge-plus');
  const gaugeTapMinus = document.getElementById('gauge-tap-minus');
  const gaugeTapPlus = document.getElementById('gauge-tap-plus');
  const progressLabel = document.getElementById('progress-label');
  const progressFill = document.getElementById('progress-fill');
  const emptyNotice = document.getElementById('empty-notice');

  let deck = [];
  let cardIdx = 0;
  let gaugeValue = 0;
  let advanceTimer = null;
  let backUpdateTimer = null;
  let frontUpdateTimer = null;
  let cardShownAt = 0;
  let cardRotation = 0;

  function setRotation(deg) {
    cardRotation = deg;
    cardInner.style.transform = `rotateY(${deg}deg)`;
  }
  function isBackShowing() {
    return (((cardRotation % 360) + 360) % 360) === 180;
  }
  function instantReset() {
    cardInner.style.transition = 'none';
    setRotation(0);
    // force reflow so the next transform change animates
    void cardInner.offsetWidth;
    cardInner.style.transition = '';
  }
  function clearContentTimers() {
    if (frontUpdateTimer) { clearTimeout(frontUpdateTimer); frontUpdateTimer = null; }
    if (backUpdateTimer)  { clearTimeout(backUpdateTimer);  backUpdateTimer  = null; }
  }
  function updateFrontFace(card) {
    document.getElementById('card-front-cat').textContent = card.cat;
    document.getElementById('card-question').innerHTML = card.q;
  }
  function updateBackFace(card) {
    document.getElementById('card-back-cat').textContent = card.cat;
    document.getElementById('card-answer').innerHTML = card.a;
    const hintEl = document.getElementById('card-hint');
    if (card.hint) { hintEl.textContent = card.hint; hintEl.style.display = ''; }
    else { hintEl.textContent = ''; hintEl.style.display = 'none'; }
  }

  // build the 7-cell gauge bar once
  for (let v = -3; v <= 3; v++) {
    const cell = document.createElement('div');
    cell.className = 'gauge-cell ' + (v < 0 ? 'neg' : v > 0 ? 'pos' : 'zero');
    cell.dataset.v = String(v);
    cell.textContent = v > 0 ? '+' + v : String(v);
    gaugeBar.appendChild(cell);
  }

  function refreshRowStates() {
    document.querySelectorAll('.category-row').forEach(row => {
      const key = row.dataset.row;
      if (!key) return;
      row.classList.toggle('disabled', !settings.categories[key].enabled);
    });
  }

  function initSettingsUI() {
    document.querySelectorAll('[data-cat]').forEach(el => {
      const key = el.dataset.cat;
      el.checked = settings.categories[key].enabled;
      el.addEventListener('change', () => {
        settings.categories[key].enabled = el.checked;
        refreshRowStates();
        saveSettings();
      });
    });

    document.querySelectorAll('[data-rev]').forEach(el => {
      const key = el.dataset.rev;
      const cfg = settings.categories[key];
      if (!cfg) return;
      el.checked = !!cfg.reverse;
      el.addEventListener('change', () => {
        cfg.reverse = el.checked;
        saveSettings();
      });
    });

    document.querySelectorAll('[data-opt]').forEach(el => {
      const opt = el.dataset.opt;
      if (opt === 'count') {
        el.value = String(settings.count);
        el.addEventListener('change', () => {
          settings.count = parseInt(el.value, 10);
          saveSettings();
        });
        return;
      }
      const [cat, field] = opt.split('.');
      const cfg = settings.categories[cat];
      if (!cfg || cfg[field] === undefined) return;
      el.value = String(cfg[field]);
      el.addEventListener('change', () => {
        cfg[field] = parseInt(el.value, 10);
        // Keep min <= max for digit-range operations
        if (cfg.minDigits !== undefined && cfg.maxDigits !== undefined) {
          if (cfg.minDigits > cfg.maxDigits) {
            if (field === 'minDigits') cfg.maxDigits = cfg.minDigits;
            else cfg.minDigits = cfg.maxDigits;
            const other = field === 'minDigits' ? 'maxDigits' : 'minDigits';
            const sel = document.querySelector(`[data-opt="${cat}.${other}"]`);
            if (sel) sel.value = String(cfg[other]);
          }
        }
        saveSettings();
      });
    });

    refreshRowStates();
  }

  function renderGauge() {
    gaugeBar.querySelectorAll('.gauge-cell').forEach(el => {
      el.classList.toggle('selected', parseInt(el.dataset.v, 10) === gaugeValue);
    });
    const atMin = gaugeValue <= -3;
    const atMax = gaugeValue >= 3;
    gaugeMinus.classList.toggle('disabled', atMin);
    gaugePlus.classList.toggle('disabled', atMax);
    gaugeTapMinus.classList.toggle('disabled', atMin);
    gaugeTapPlus.classList.toggle('disabled', atMax);
  }
  function resetGauge() {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    gaugeValue = 0;
    renderGauge();
  }
  function bumpGauge(delta) {
    if (!isBackShowing()) return;
    const next = Math.max(-3, Math.min(3, gaugeValue + delta));
    if (next === gaugeValue) return;
    gaugeValue = next;
    renderGauge();
    scheduleAdvance();
  }
  function scheduleAdvance() {
    if (advanceTimer) clearTimeout(advanceTimer);
    advanceTimer = setTimeout(commitAndAdvance, ADVANCE_DELAY_MS);
  }
  function commitAndAdvance() {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    if (deck.length === 0) return;
    const card = deck[cardIdx];
    appendRecord({
      ts: Date.now(),
      catKey: card.catKey || '',
      cat: card.cat || '',
      q: card.q,
      a: card.a,
      mastery: gaugeValue,
      elapsedMs: Date.now() - cardShownAt
    });
    if (cardIdx >= deck.length - 1) {
      exitDeck();
    } else {
      showCard(cardIdx + 1, 'forward');
    }
  }

  function showCard(idx, direction) {
    if (deck.length === 0) return;
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    clearContentTimers();
    cardIdx = Math.max(0, Math.min(idx, deck.length - 1));
    const card = deck[cardIdx];

    resetGauge();
    cardShownAt = Date.now();

    if (!direction) {
      // init / restart: snap rotation to 0 without animation
      instantReset();
      updateFrontFace(card);
      updateBackFace(card);
    } else if (direction === 'forward') {
      // was showing back; rotate left (-180) to reveal new card's front
      setRotation(cardRotation - 180);
      frontUpdateTimer = setTimeout(() => updateFrontFace(card), FLIP_MS / 2);
      backUpdateTimer  = setTimeout(() => updateBackFace(card),  FLIP_MS);
    } else if (direction === 'backward') {
      if (isBackShowing()) {
        // back visible; rotate right (+180) to reveal new card's front
        setRotation(cardRotation + 180);
        frontUpdateTimer = setTimeout(() => updateFrontFace(card), FLIP_MS / 2);
        backUpdateTimer  = setTimeout(() => updateBackFace(card),  FLIP_MS);
      } else {
        // front visible; full +360 spin right, swap both faces at midpoint
        setRotation(cardRotation + 360);
        frontUpdateTimer = setTimeout(() => {
          updateFrontFace(card);
          updateBackFace(card);
        }, FLIP_MS / 2);
      }
    }

    progressLabel.textContent = `${cardIdx + 1} / ${deck.length}`;
    progressFill.style.width = `${((cardIdx + 1) / deck.length) * 100}%`;
  }

  function startDeck() {
    deck = buildDeck();
    if (deck.length === 0) {
      emptyNotice.classList.add('show');
      return;
    }
    emptyNotice.classList.remove('show');
    settingsSection.classList.add('hidden');
    cardSection.classList.remove('hidden');
    showCard(0);
    window.scrollTo(0, 0);
  }

  function exitDeck() {
    cardSection.classList.add('hidden');
    settingsSection.classList.remove('hidden');
    clearContentTimers();
    instantReset();
    window.scrollTo(0, 0);
  }

  function handleRightTap() {
    if (advanceTimer) return;
    if (!isBackShowing()) {
      // Flush any pending back-face update so the user sees the correct answer
      // when they flip in fast succession.
      if (backUpdateTimer) {
        clearTimeout(backUpdateTimer);
        backUpdateTimer = null;
        updateBackFace(deck[cardIdx]);
      }
      // forward flip: rotate left (-180)
      setRotation(cardRotation - 180);
    } else {
      commitAndAdvance();
    }
  }
  function handleLeftTap() {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    if (cardIdx > 0) showCard(cardIdx - 1, 'backward');
  }

  tapRight.addEventListener('click', handleRightTap);
  tapLeft.addEventListener('click', handleLeftTap);

  gaugeTapMinus.addEventListener('click', (e) => {
    e.stopPropagation();
    bumpGauge(-1);
  });
  gaugeTapPlus.addEventListener('click', (e) => {
    e.stopPropagation();
    bumpGauge(+1);
  });

  backBtn.addEventListener('click', exitDeck);
  startBtn.addEventListener('click', startDeck);

  document.addEventListener('keydown', (e) => {
    if (cardSection.classList.contains('hidden')) return;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      handleRightTap();
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      handleRightTap();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      handleLeftTap();
    } else if (e.key === '+' || e.key === '=') {
      e.preventDefault();
      bumpGauge(+1);
    } else if (e.key === '-' || e.key === '_') {
      e.preventDefault();
      bumpGauge(-1);
    } else if (e.key === 'Escape') {
      exitDeck();
    }
  });

  initSettingsUI();
})();
</script>
</body>
</html>
